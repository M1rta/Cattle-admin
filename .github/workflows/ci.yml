name: CI

on:
  push:
    branches: [ "main", "test-actions", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Instalacion de dependecias y CI tools
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt ruff pytest

    - name: Check Python syntax
      run: python -m compileall api

    - name: Busqueda de .html no permitido por vercel
      shell: pwsh
      run: |
        $files = Get-ChildItem -Path "api/templates" -Filter *.html -Recurse
        $foundError = $false
        foreach ($file in $files) {
            $content = Get-Content $file.FullName -Raw
            if ($content -match 'href="[^"]+\.html"') {
                Write-Host "--------------------------------------------------------" -ForegroundColor Red
                Write-Host "❌ ERROR DE RUTA EN: $($file.Name)" -ForegroundColor Red
                Select-String -Path $file.FullName -Pattern 'href="[^"]+\.html"' | ForEach-Object {
                    Write-Host "Línea $($_.LineNumber): $($_.Line.Trim()) <--- ❌ QUITAR EL .html" -ForegroundColor Yellow
                }
                $foundError = $true
            }
        }
        if ($foundError) {
            Write-Host "`nERROR: Vercel no permite .html en los enlaces." -ForegroundColor Red
            exit 1
        } else {
            Write-Host "✅ Validación exitosa: Rutas limpias." -ForegroundColor Green
        }

    - name: Run lint (Ruff)
      run: ruff check api

    - name: Smoke test Flask app import
      run: python -c "from api.index import app; print('App cargada correctamente')"

    - name: Run tests if present
      shell: pwsh
      run: |
        if (Test-Path tests) {
          pytest
        } else {
          Write-Host "No tests directory found. Skipping pytest."
        }
