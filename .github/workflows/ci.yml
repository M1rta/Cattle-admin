name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and CI tools
        run: pip install -r requirements.txt ruff pytest

      - name: Check Python syntax
        run: python -m compileall api

      - name: Smoke test Flask app import
        run: python -c "from api.index import app; print(app.url_map)"

      - name: Run lint
        run: ruff check api

      - name: Run tests if present
        shell: pwsh
        run: |
          if (Test-Path tests) {
            pytest
          } else {
            Write-Host "No tests directory found. Skipping pytest."
          }
