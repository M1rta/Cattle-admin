<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión | Gestor de Ganado</title>

  <!-- CSS generado desde login.scss -->
  <link rel="stylesheet" href="/static/css/login.css" />
</head>

<body>

  <main class="login-container">
    <section class="login-card">
      <h1 class="login-title">Iniciar sesión</h1>
      <p class="login-subtitle">Accede a tu cuenta para ver tu ganado y vacunas</p>

      <!-- IMPORTANTE: type="button" en el botón para evitar recargas por submit -->
      <form id="login-form" autocomplete="on">

        <div class="input-group">
          <input type="email" id="email" placeholder="Correo" required />
        </div>

        <div class="input-group">
          <input type="password" id="password" placeholder="Contraseña" required />
        </div>

        <!-- IMPORTANTE -->
        <button type="submit" class="login-btn">Entrar</button>

        <div class="login-link">
          ¿No tienes cuenta? <a href="/register.html">Crear cuenta</a>
        </div>

      </form>
    </section>
  </main>
  <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>

</html>
