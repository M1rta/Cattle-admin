<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenido - Gestor de Ganado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/static/css/login.css" />
</head>

<body>

  <div class="split-layout">

    <div class="split-left">
      <h1 class="welcome-title">Welcome</h1>
      <button class="btn-auth btn-auth-login" onclick="cambiarPanel('login')">Login</button>
      <button class="btn-auth btn-auth-signup" onclick="cambiarPanel('register')">Sign Up</button>
    </div>

    <div class="split-right">

      <div id="panel-image" class="right-pane pane-image active"></div>

      <div id="panel-login" class="right-pane">
        <div class="auth-card">
          <h2>Login</h2>
          <form id="form-login">
            <div class="form-group">
              <label for="login-email">Email address</label>
              <input type="email" id="login-email" placeholder="tu@correo.com" required>
            </div>
            <div class="form-group">
              <label for="login-password">Password</label>
              <a href="#" class="forgot-link">Forgot password?</a>
              <input type="password" id="login-password" placeholder="Tu contraseña" required>
            </div>
            <button type="button" class="btn-submit" onclick="procesarLogin()">Sign in</button>
            <div class="auth-footer">
              Not a member? <a onclick="cambiarPanel('register')">Create an account.</a>
            </div>
          </form>
        </div>
      </div>

      <div id="panel-register" class="right-pane">
        <div class="auth-card">
          <h2>Sign Up</h2>
          <form id="form-register">
            <div class="form-group">
              <label for="reg-name">Name</label>
              <input type="text" id="reg-name" placeholder="Ej: Juan Pérez" required>
            </div>

            <div class="form-group">
              <label for="reg-email">Email address</label>
              <input type="email" id="reg-email" placeholder="tu@correo.com" required>
            </div>

            <div class="form-group">
              <label for="reg-password">Password</label>
              <input type="password" id="reg-password" placeholder="Mínimo 8 caracteres" required>
            </div>

            <button type="button" class="btn-submit" onclick="procesarRegistro()">Sign up</button>
            <div class="auth-footer">
              Already have an account? <a onclick="cambiarPanel('login')">Sign in.</a>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>

  <script src="/static/js/login.js"></script>
</body>

</html>
